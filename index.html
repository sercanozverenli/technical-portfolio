<style>
/* ... Mevcut Sidebar ve Topbar CSS'leri aynı kalacak ... */

/* ── DASHBOARD YENİ NESİL CSS ── */
#dashboard-root { margin-top: 40px; width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; }
.dashboard-container { display: flex; flex-direction: column; gap: 30px; }

/* 2x2 Grid ve Ortalama */
.stats-grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 25px; 
}

.stat-card {
    border-radius: 20px;
    border: 1.5px solid rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.3s ease;
    background: #fff;
}

/* Renkli Gradyanlar */
.purple { background: linear-gradient(135deg, #f5f3ff 0%, #ffffff 100%); border-color: #ddd6fe; }
.green  { background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%); border-color: #bbf7d0; }
.blue   { background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%); border-color: #bfdbfe; }
.orange { background: linear-gradient(135deg, #fff7ed 0%, #ffffff 100%); border-color: #fed7aa; }

body.dark .stat-card { background: #1e293b !important; border-color: #334155; }

.card-header { padding: 20px; display: flex; align-items: center; gap: 15px; }
.card-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
body.dark .card-icon { background: #0f172a; }

.card-title-group h3 { margin: 0 !important; font-size: 18px !important; font-weight: 800 !important; color: #1e293b; }
body.dark .card-title-group h3 { color: #f8fafc; }

/* DOKÜMAN YAZISI DÜZELTME (İnce Font) */
.card-body { padding: 0 20px 20px 20px; display: flex; flex-direction: column; margin-top: auto; }
.status-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-weight: 600; color: #475569; }
body.dark .status-row { border-bottom-color: rgba(255,255,255,0.05); color: #94a3b8; }

.status-mini-icon { width: 22px; height: 22px; margin-right: 10px; }
.status-count { margin-left: auto; font-weight: 400; color: #64748b; font-size: 14px; } /* İnce ve gri yapıldı */
.status-count span { font-weight: 800; color: #1e293b; margin-right: 4px; } /* Rakam hala kalın */
body.dark .status-count span { color: #f1f5f9; }

.card-footer { padding: 15px 20px; background: rgba(255,255,255,0.5); border-top: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; text-decoration: none !important; font-size: 13px; font-weight: 700; color: #475569; }
body.dark .card-footer { background: rgba(0,0,0,0.2); color: #94a3b8; }
.github-mini-img { width: 18px; height: 18px; margin-right: 8px; }

/* ── ALT BÖLÜM: YATAY TASARIM ── */
.featured-horizontal-layout { display: flex; gap: 25px; align-items: stretch; }

.featured-card.horizontal { 
    flex: 3; 
    display: flex; 
    background: linear-gradient(135deg, #fff7ed 0%, #ffffff 100%); 
    border-radius: 24px; border: 2px solid #fed7aa; padding: 30px; 
    box-shadow: 0 10px 30px rgba(234, 88, 12, 0.1);
}
body.dark .featured-card.horizontal { background: #1e293b; border-color: #431407; }

.featured-info { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-right: 20px; }
.featured-info h2 { font-size: 30px !important; font-weight: 900 !important; margin: 10px 0 !important; color: #1e293b; }
body.dark .featured-info h2 { color: #f8fafc; }

.global-stats-mini { display: flex; gap: 20px; margin-top: 20px; }
.mini-stat { display: flex; flex-direction: column; }
.mini-stat span:first-child { font-size: 24px; font-weight: 900; color: #ea580c; }
.mini-stat span:last-child { font-size: 12px; color: #94a3b8; text-transform: uppercase; font-weight: 700; }

.featured-diagram-large { flex: 2; background: #fff; border-radius: 16px; padding: 15px; border: 1px solid #fed7aa; display: flex; flex-direction: column; align-items: center; }
body.dark .featured-diagram-large { background: #0f172a; border-color: #431407; }
.diagram-label { font-size: 11px; font-weight: 800; color: #ea580c; text-transform: uppercase; margin-bottom: 10px; }
.featured-diagram-large img { max-width: 100%; height: auto; border-radius: 8px; }

/* Tech Stack Kartı */
.tech-stack-card { 
    flex: 1; 
    background: #fff; 
    border-radius: 24px; 
    border: 1.5px solid #e2e8f0; 
    padding: 25px; 
    display: flex; 
    flex-direction: column; 
}
body.dark .tech-stack-card { background: #1e293b; border-color: #334155; }
.stack-header { font-size: 14px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
.stack-list { list-style: none !important; padding: 0 !important; margin: 0 !important; }
.stack-list li { display: flex; align-items: center; gap: 12px; padding: 10px 0; font-size: 13px; font-weight: 600; color: #475569; border-bottom: 1px solid #f8fafc; }
body.dark .stack-list li { color: #cbd5e1; border-bottom-color: #334155; }
.stack-list li i { width: 16px; height: 16px; color: #ea580c; }

/* Mobil Uyumluluk */
@media (max-width: 992px) {
    .stats-grid { grid-template-columns: 1fr; }
    .featured-horizontal-layout { flex-direction: column; }
    .featured-card.horizontal { flex-direction: column; }
}
</style>

<script>
// ... runDashboardEngine fonksiyonu aynı kalacak, sadece ID'ler README ile uyumlu olmalı ...
function runDashboardEngine() {
    if (window.lucide) { window.lucide.createIcons(); }
    const dashboard = document.getElementById('dashboard-root');
    if (!dashboard) return;

    const sidebar = document.querySelector('.sidebar-nav');
    if (!sidebar) return;

    const categories = {
        'Sistemler': 'systems',
        'Uygulamalar': 'apps',
        'Analitik Modüller': 'analytics',
        'Rehberler': 'guides'
    };

    let globalTotalProjects = 0;
    let globalTotalDocs = 0;

    Object.keys(categories).forEach(catName => {
        const idPrefix = categories[catName];
        const allSummaries = Array.from(sidebar.querySelectorAll('summary'));
        const catSummary = allSummaries.find(s => s.textContent.includes(catName));

        if (catSummary) {
            const parentDetails = catSummary.parentElement;
            const firstLevelList = parentDetails.querySelector('ul');
            let projectCount = 0;
            
            if (firstLevelList) {
                projectCount = Array.from(firstLevelList.children).filter(li => li.querySelector('details')).length;
                if (projectCount === 0) {
                    projectCount = firstLevelList.querySelectorAll('li > a').length;
                }
            }

            const docCount = parentDetails.querySelectorAll('li > a').length;
            const done = parentDetails.querySelectorAll('.status-done').length;
            const wip = parentDetails.querySelectorAll('.status-wip').length;
            const idea = parentDetails.querySelectorAll('.status-idea').length;

            if(document.getElementById(`count-${idPrefix}-total-projects`)) 
                document.getElementById(`count-${idPrefix}-total-projects`).textContent = projectCount;
            
            if(document.getElementById(`count-${idPrefix}-done`)) document.getElementById(`count-${idPrefix}-done`).textContent = done;
            if(document.getElementById(`count-${idPrefix}-wip`)) document.getElementById(`count-${idPrefix}-wip`).textContent = wip;
            if(document.getElementById(`count-${idPrefix}-idea`)) document.getElementById(`count-${idPrefix}-idea`).textContent = idea;

            globalTotalProjects += projectCount;
            globalTotalDocs += docCount;
        }
    });

    if(document.getElementById('global-total-projects')) document.getElementById('global-total-projects').textContent = globalTotalProjects;
    if(document.getElementById('global-total-docs')) document.getElementById('global-total-docs').textContent = globalTotalDocs;
}
</script>
