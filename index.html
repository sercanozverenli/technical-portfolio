<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Workspace · Personal R&D Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Loading workspace...</div>
  <script>
    window.$docsify = {
      name: 'Workspace',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      alias: {
        // 1. Ana siteye ilk girişi doğrudan Türkçe ana sayfaya bağlar
        '/': '/tr/README.md',
        
        // 2. Dil katmanlarının kendi kök isteklerini karşılar
        '/tr/': '/tr/README.md',
        '/en/': '/en/README.md',
        
        // 3. Alt kırılımlardaki menü isteklerini ilgili dilin sidebar'ına yönlendirir
        '/.*/_sidebar.md': '/tr/_sidebar.md',
        '/en/.*/_sidebar.md': '/en/_sidebar.md'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
